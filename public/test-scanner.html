<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narxi — Receipt Scanner Test</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Inter, system-ui, -apple-system, sans-serif; background: #f5f5f4; color: #1c1917; }
      .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e7e5e4; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
      h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #44403c; }
      .muted { color: #78716c; font-size: 13px; }

      .input-row { display: flex; gap: 8px; margin-top: 10px; }
      .input-row input { flex: 1; border: 1px solid #d6d3d1; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; }
      .input-row input:focus { border-color: #059669; }

      button { border: none; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button:active:not(:disabled) { opacity: 0.7; }

      .btn-green { background: #059669; color: #fff; }
      .btn-blue { background: #2563eb; color: #fff; }
      .btn-outline { background: #fff; color: #059669; border: 1px solid #059669; }
      .btn-red { background: #dc2626; color: #fff; }

      .scanner-controls { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

      #qr-reader { width: 100%; border-radius: 10px; overflow: hidden; }
      #qr-reader video { border-radius: 10px; }

      .status { padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 10px; }
      .status-info { background: #dbeafe; color: #1e40af; }
      .status-ok { background: #dcfce7; color: #166534; }
      .status-err { background: #fee2e2; color: #991b1b; }
      .status-warn { background: #fef3c7; color: #92400e; }

      .receipt-meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 14px; margin-bottom: 12px; }
      .receipt-meta dt { font-weight: 600; color: #57534e; }
      .receipt-meta dd { color: #1c1917; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      thead { background: #f5f5f4; }
      th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid #e7e5e4; }
      th { font-weight: 600; color: #57534e; font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      .match-good { color: #059669; font-weight: 600; }
      .match-ok { color: #d97706; }
      .match-bad { color: #dc2626; }

      .hidden { display: none; }
      .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- Scanner card -->
      <div class="card">
        <h1>📷 Receipt Scanner Test</h1>
        <p class="muted">Scan a receipt QR code from ofd.soliq.uz or paste the link manually.</p>

        <div class="scanner-controls" style="margin-top: 12px;">
          <button class="btn-green" id="startBtn" onclick="toggleScanner()">Start Camera</button>
          <button class="btn-red hidden" id="stopBtn" onclick="stopScanner()">Stop Camera</button>
        </div>

        <div id="qr-reader" class="hidden"></div>

        <div class="input-row">
          <input type="text" id="urlInput" placeholder="https://ofd.soliq.uz/check?t=...&r=...&c=...&s=..." />
          <button class="btn-blue" id="fetchBtn" onclick="fetchReceipt()">Fetch</button>
        </div>

        <div id="statusBox" class="hidden"></div>
      </div>

      <!-- Results card -->
      <div class="card hidden" id="resultsCard">
        <h2>Receipt Data</h2>
        <dl class="receipt-meta" id="receiptMeta"></dl>
        <div id="itemsSection"></div>
      </div>
    </div>

    <script>
      let scanner = null;
      let scanning = false;

      const urlInput = document.getElementById('urlInput');
      const fetchBtn = document.getElementById('fetchBtn');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusBox = document.getElementById('statusBox');
      const resultsCard = document.getElementById('resultsCard');
      const receiptMeta = document.getElementById('receiptMeta');
      const itemsSection = document.getElementById('itemsSection');
      const qrReader = document.getElementById('qr-reader');

      function showStatus(msg, type) {
        statusBox.className = `status status-${type}`;
        statusBox.innerHTML = msg;
        statusBox.classList.remove('hidden');
      }

      function hideStatus() {
        statusBox.classList.add('hidden');
      }

      function isSoliqUrl(url) {
        try {
          const parsed = new URL(url);
          return parsed.hostname === 'ofd.soliq.uz' && parsed.pathname === '/check';
        } catch { return false; }
      }

      // ── QR Scanner ──────────────────────────────────────────────
      async function toggleScanner() {
        if (scanning) { stopScanner(); return; }

        qrReader.classList.remove('hidden');
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');

        scanner = new Html5Qrcode('qr-reader');
        scanning = true;

        try {
          await scanner.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            () => {}
          );
        } catch (err) {
          showStatus('Camera error: ' + err, 'err');
          stopScanner();
        }
      }

      async function stopScanner() {
        if (scanner) {
          try { await scanner.stop(); } catch {}
          scanner = null;
        }
        scanning = false;
        qrReader.classList.add('hidden');
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
      }

      function onScanSuccess(decodedText) {
        if (!isSoliqUrl(decodedText)) {
          showStatus('Scanned QR is not an ofd.soliq.uz link: <code>' + escHtml(decodedText.substring(0, 120)) + '</code>', 'warn');
          return;
        }

        urlInput.value = decodedText;
        stopScanner();
        showStatus('QR scanned! Fetching receipt...', 'info');
        fetchReceipt();
      }

      // ── Fetch receipt ───────────────────────────────────────────
      async function fetchReceipt() {
        const url = urlInput.value.trim();
        if (!url) { showStatus('Please enter a URL or scan a QR code.', 'warn'); return; }
        if (!isSoliqUrl(url)) { showStatus('Not a valid ofd.soliq.uz/check URL.', 'err'); return; }

        fetchBtn.disabled = true;
        fetchBtn.innerHTML = '<span class="spinner"></span>Fetching...';
        resultsCard.classList.add('hidden');
        showStatus('Fetching receipt from ofd.soliq.uz...', 'info');

        try {
          const resp = await fetch('/api/test-receipt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });

          const data = await resp.json();

          if (!data.ok) {
            const errMsg = data.detail || data.error || 'Unknown error';
            showStatus('Error: ' + escHtml(errMsg), 'err');
            return;
          }

          showStatus(`Parsed ${data.itemCount} item(s) from receipt.`, 'ok');
          renderResults(data);
        } catch (err) {
          showStatus('Network error: ' + escHtml(err.message), 'err');
        } finally {
          fetchBtn.disabled = false;
          fetchBtn.textContent = 'Fetch';
        }
      }

      // ── Render results ──────────────────────────────────────────
      function renderResults(data) {
        resultsCard.classList.remove('hidden');

        // Meta
        const metaFields = [
          ['Store', data.storeName],
          ['Address', data.storeAddress],
          ['City', data.city],
          ['Date', data.receiptDate],
          ['Location', data.latitude && data.longitude ? `${data.latitude}, ${data.longitude}` : '—'],
          ['Total', data.totalAmount ? formatPrice(data.totalAmount) : '—'],
          ['Items', data.itemCount],
          ['Parse stage', data.parseStage],
        ];

        receiptMeta.innerHTML = metaFields
          .map(([label, value]) => `<dt>${escHtml(label)}</dt><dd>${escHtml(String(value || '—'))}</dd>`)
          .join('');

        // Items table
        if (!data.items || data.items.length === 0) {
          itemsSection.innerHTML = '<p class="muted">No items found in receipt.</p>';
          return;
        }

        let html = `<table>
          <thead><tr>
            <th>#</th>
            <th>Product (receipt)</th>
            <th class="num">Qty</th>
            <th class="num">Price</th>
            <th>Matched product</th>
            <th class="num">Score</th>
          </tr></thead><tbody>`;

        data.items.forEach((item, i) => {
          const scoreClass = item.matchScore >= 70 ? 'match-good' : item.matchScore >= 50 ? 'match-ok' : 'match-bad';
          const matchedName = item.matchedProduct
            ? (item.matchedProduct.name_uz || item.matchedProduct.name_ru || '—')
            : '—';

          html += `<tr>
            <td>${i + 1}</td>
            <td>${escHtml(item.name)}</td>
            <td class="num">${item.quantity}</td>
            <td class="num">${formatPrice(item.totalPrice)}</td>
            <td>${escHtml(matchedName)}</td>
            <td class="num ${scoreClass}">${item.matchScore}%</td>
          </tr>`;
        });

        html += '</tbody></table>';
        itemsSection.innerHTML = html;
      }

      function formatPrice(value) {
        return Number(value).toLocaleString('uz-UZ') + ' so\'m';
      }

      function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // Auto-fill from URL params (e.g. ?url=https://ofd.soliq.uz/check?t=...)
      (function () {
        const params = new URLSearchParams(window.location.search);
        const presetUrl = params.get('url');
        if (presetUrl) {
          urlInput.value = presetUrl;
        }
      })();
    </script>
  </body>
</html>
