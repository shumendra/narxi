<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narxi Receipt Reader</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #f5f5f4; color: #1c1917; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e7e5e4; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
      .title { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
      .muted { color: #57534e; font-size: 14px; }
      .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
      button { border: 1px solid #059669; background: #059669; color: #fff; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
      button.alt { background: #fff; color: #065f46; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #292524; color: #f5f5f4; border-radius: 10px; padding: 10px; white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">Receipt Reader</h1>
        <div class="muted" id="metaText">Preparing...</div>
        <div class="actions">
          <button id="openReceiptBtn">1) Open receipt page</button>
          <button id="submitBtn">2) Submit receipt</button>
          <button class="alt" id="backBtn">Back to Mini App</button>
        </div>
      </div>

      <div class="card">
        <div class="muted" style="margin-bottom: 6px;">Result</div>
        <div id="result" class="log">No submission yet.</div>
      </div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const receiptUrl = (params.get('url') || '').trim();
        const telegramId = (params.get('tid') || 'anonymous').trim();
        const city = (params.get('city') || '').trim();

        const metaText = document.getElementById('metaText');
        const openReceiptBtn = document.getElementById('openReceiptBtn');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');
        const result = document.getElementById('result');

        if (!receiptUrl) {
          metaText.textContent = 'Invalid link: missing url query param.';
          openReceiptBtn.disabled = true;
          submitBtn.disabled = true;
          return;
        }

        metaText.textContent = 'Open receipt first, then press Submit.';

        openReceiptBtn.addEventListener('click', () => {
          window.open(receiptUrl, '_blank', 'noopener,noreferrer');
        });

        backBtn.addEventListener('click', () => {
          if (window.history.length > 1) {
            window.history.back();
            return;
          }
          window.close();
        });

        const submitPayload = async (payload) => {
          const response = await fetch('/api/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          return { ok: response.ok, data };
        };

        submitBtn.addEventListener('click', async () => {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Submitting...';
          result.textContent = 'Submitting receipt...';

          try {
            const primary = await submitPayload({
              url: receiptUrl,
              telegram_id: telegramId || 'anonymous',
              city: city || undefined,
            });

            if (primary.ok && primary.data?.ok) {
              result.textContent = JSON.stringify(primary.data, null, 2);
              return;
            }

            const fallbackErrors = new Set(['scrape_failed', 'parse_failed', 'parse_empty', 'fetch_failed', 'server_error']);
            if (fallbackErrors.has(primary.data?.error)) {
              result.textContent = 'Could not auto-read receipt. Sending to moderation queue...';
              const queued = await submitPayload({
                url: receiptUrl,
                force_queue: true,
                telegram_id: telegramId || 'anonymous',
                city: city || undefined,
              });
              result.textContent = JSON.stringify(queued.data, null, 2);
              return;
            }

            result.textContent = JSON.stringify(primary.data, null, 2);
          } catch (error) {
            result.textContent = `Submit failed: ${error?.message || String(error)}`;
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '2) Submit receipt';
          }
        });
      })();
    </script>
  </body>
</html>
